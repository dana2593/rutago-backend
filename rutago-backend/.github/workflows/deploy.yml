name: RutaGo Backend — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}          # e.g. acrrutago.azurecr.io
  IMAGE_NAME: rutago-backend
  CONTAINER_APP_NAME: ca-rutago-backend
  RESOURCE_GROUP: rg-rutago-prod

jobs:
  # ─────────────────────────────────────────────────────
  # 1. LINT + SYNTAX CHECK
  # ─────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Run ruff
        run: ruff check app/

  # ─────────────────────────────────────────────────────
  # 2. BUILD & PUSH IMAGE TO ACR
  # ─────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────────────────
  # 3. DEPLOY TO AZURE CONTAINER APPS
  # ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new revision
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Verify deployment
        run: |
          echo "Esperando que la revisión esté activa..."
          sleep 15
          STATUS=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].properties.runningState" -o tsv)
          echo "Estado: $STATUS"
          if [ "$STATUS" != "Running" ]; then
            echo "ERROR: La revisión no está corriendo"
            exit 1
          fi
